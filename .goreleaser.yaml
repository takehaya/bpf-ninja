version: 2
env:
  - CGO_ENABLED=1
before:
  hooks:
    - go mod tidy
builds:
  - id: bpf-ninja
    binary: bpf-ninja
    main: ./cmd/bpf-ninja
    goos: [linux]
    goarch: [amd64]
archives:
  - id: bpf-ninja
    formats: ['tar.gz']
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
release:
  github:
    owner: takehaya
    name: bpf-ninja
  draft: false
  prerelease: auto
